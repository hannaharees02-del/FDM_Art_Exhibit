<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Digital Exhibition</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #f2f2f2;
      line-height: 1.6;
    }

    header {
      padding: 60px 20px;
      text-align: center;
      background: black;
    }

    header h1 {
      margin: 0;
      font-size: 36px;
    }

    header p {
      margin-top: 10px;
      font-size: 18px;
      opacity: 0.8;
    }

    .section {
      padding: 60px 20px;
      max-width: 1000px;
      margin: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .grid img {
      width: 100%;
      height: auto;
      display: block;
    }

    .caption {
      font-size: 14px;
      margin-top: 8px;
      opacity: 0.7;
    }

    footer {
      text-align: center;
      padding: 40px 20px;
      background: black;
      font-size: 14px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

<header>
  <h1>Title of the Exhibition</h1>
  <p>Artist Name — 2026</p>
</header>

<section class="section">
  <h2>About the Work</h2>
  <p>
    This body of work explores themes of perception, space, and digital
    presence. The QR code acts as a portal between physical and virtual layers.
  </p>
</section>

<section class="section">
  <h2>Works</h2>

  <div class="grid">
    <div>
      <img src="image1.jpg" alt="Artwork 1">
      <div class="caption">Artwork 1 — 2026</div>
    </div>

    <div>
      <img src="image2.jpg" alt="Artwork 2">
      <div class="caption">Artwork 2 — 2026</div>
    </div>

    <div>
      <img src="image3.jpg" alt="Artwork 3">
      <div class="caption">Artwork 3 — 2026</div>
    </div>
  </div>

</section>

<footer>
  © 2026 Artist Name
</footer>

</body>
</html>
